<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام الموارد البشرية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #0d9488;
            --primary-bg: #f0fdfa;
            --surface: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --shadow: 0 20px 60px -15px rgba(15, 118, 110, 0.18);
            --shadow-sm: 0 4px 12px rgba(15, 118, 110, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            direction: rtl;
            font-family: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
            background: var(--surface);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(20, 184, 166, 0.2), transparent),
                radial-gradient(ellipse 60% 40% at 100% 50%, rgba(15, 118, 110, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 0% 50%, rgba(15, 118, 110, 0.08), transparent);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(20, 184, 166, 0.12);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .login-card:hover {
            box-shadow: 0 25px 65px -15px rgba(15, 118, 110, 0.22);
        }

        /* Header area */
        .login-card-header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card-header::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-card-header .logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: white;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .login-card-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: white;
            margin: 0 0 0.3rem;
            letter-spacing: -0.02em;
        }

        .login-card-header p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
        }

        /* Body */
        .login-card-body {
            padding: 2rem 2rem 1.5rem;
        }

        .alert-error {
            background: var(--danger-bg);
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        .form-group { margin-bottom: 1.25rem; }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            font-size: 1rem;
            color: var(--text-muted);
            z-index: 2;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-control-custom {
            width: 100%;
            padding: 0.75rem 2.75rem 0.75rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            color: var(--text);
            font-family: inherit;
        }

        .form-control-custom:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
        }

        .form-control-custom:focus ~ .input-icon,
        .form-control-custom:focus + .input-icon {
            color: var(--primary);
        }

        .form-control-custom::placeholder { color: #cbd5e1; }

        .password-toggle {
            position: absolute;
            left: 0.75rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1rem;
            z-index: 3;
            transition: color 0.2s;
        }

        .password-toggle:hover { color: var(--primary); }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .form-check-custom {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .form-check-custom input[type="checkbox"] {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover { color: var(--primary-dark); }

        .btn-login {
            width: 100%;
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 4px 14px rgba(15, 118, 110, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
            color: white;
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        /* Portal link */
        .portal-link-wrapper {
            padding: 0 2rem 1.5rem;
            text-align: center;
        }

        .portal-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.25rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            background: white;
        }

        .portal-link:hover {
            border-color: var(--primary-light);
            color: var(--primary);
            background: var(--primary-bg);
        }

        /* Footer */
        .login-footer {
            text-align: center;
            padding: 1rem 0 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Security badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .security-badge i { color: var(--primary-light); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-card-header">
                <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
                <h1>نظام الموارد البشرية</h1>
                <p>تسجيل دخول المسؤول</p>
            </div>

            <!-- Body -->
            <div class="login-card-body">
                {% if error %}
                    <div class="alert-error">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <span>{{ error }}</span>
                    </div>
                {% endif %}

                <form method="POST" id="loginForm" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Username -->
                    <div class="form-group">
                        <label for="username">اسم المستخدم</label>
                        <div class="input-wrapper">
                            <input type="text"
                                   id="username"
                                   class="form-control-custom"
                                   name="username"
                                   placeholder="أدخل اسم المستخدم"
                                   autocomplete="username"
                                   required
                                   autofocus>
                            <span class="input-icon"><i class="bi bi-person-fill"></i></span>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password"
                                   id="password"
                                   class="form-control-custom"
                                   name="password"
                                   placeholder="أدخل كلمة المرور"
                                   autocomplete="current-password"
                                   required>
                            <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="إظهار كلمة المرور">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Options row -->
                    <div class="form-options">
                        <label class="form-check-custom">
                            <input type="checkbox" name="remember" id="rememberMe">
                            <span>تذكرني</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="return false;">نسيت كلمة المرور؟</a>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="spinner"></span>
                        <span class="btn-text">
                            <i class="bi bi-box-arrow-in-left"></i>
                            تسجيل الدخول
                        </span>
                    </button>

                    <!-- Security badge -->
                    <div class="security-badge">
                        <i class="bi bi-shield-check"></i>
                        <span>اتصال آمن ومحمي</span>
                    </div>
                </form>
            </div>

            <!-- Portal link -->
            <div class="portal-link-wrapper">
                <a href="{{ url_for('portal.employee_login') }}" class="portal-link">
                    <i class="bi bi-person-workspace"></i>
                    دخول بوابة الموظف
                </a>
            </div>
        </div>

        <div class="login-footer">
            نظام إدارة الموارد البشرية &copy; 2026
        </div>
    </div>

    <script>
        // Toggle password visibility
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        toggleBtn.addEventListener('click', function () {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleIcon.classList.toggle('bi-eye', !isPassword);
            toggleIcon.classList.toggle('bi-eye-slash', isPassword);
            passwordInput.focus();
        });

        // Loading state on submit
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', function () {
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
        });

        // Auto-dismiss error alert after 5 seconds
        {% if error %}
        setTimeout(function () {
            const alert = document.querySelector('.alert-error');
            if (alert) {
                alert.style.transition = 'opacity 0.4s, transform 0.4s';
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-8px)';
                setTimeout(function () { alert.style.display = 'none'; }, 400);
            }
        }, 5000);
        {% endif %}
    </script>
</body>
</html>
